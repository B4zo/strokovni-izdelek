services:
  api:
    image: ${DOCKER_REGISTRY-}api
    build:
      context: ..
      dockerfile: API/Dockerfile
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql/db_setup.sql:/docker-entrypoint-initdb.d/001_db_setup.sql:ro

volumes:
  pgdata:
